<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes Keeper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="screen">
    <div class="card">
      <h1>Notes Keeper</h1>
      <p class="subtitle">Sign in to your notes</p>
      <input id="login-username" type="text" placeholder="Username" />
      <input id="login-password" type="password" placeholder="Password" />
      <button onclick="login()">Sign In</button>
      
      <div class="divider">
        <span>OR</span>
      </div>
      
      <button class="oauth-btn google" onclick="loginWithOAuth('google')">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707 0-.593.102-1.17.282-1.709V4.958H.957C.347 6.173 0 7.548 0 9c0 1.452.348 2.827.957 4.042l3.007-2.335z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>
      
      <p class="toggle-link">No account? <a href="#" onclick="showRegister()">Register</a></p>
      <p id="login-error" class="error"></p>
    </div>
  </div>

  <!-- Register Screen -->
  <div id="register-screen" class="screen hidden">
    <div class="card">
      <h1>Create Account</h1>
      <input id="reg-username" type="text" placeholder="Username" />
      <input id="reg-password" type="password" placeholder="Password" />
      <button onclick="register()">Register</button>
      <p class="toggle-link">Have an account? <a href="#" onclick="showLogin()">Sign In</a></p>
      <p id="reg-error" class="error"></p>
    </div>
  </div>

  <!-- App Screen -->
  <div id="app-screen" class="screen hidden">
    <header>
      <div class="header-left">
        <h2>Notes Keeper</h2>
        <span id="user-label"></span>
      </div>
      <button class="btn-outline" onclick="logout()">Logout</button>
    </header>

    <div class="app-body">
      <!-- Sidebar -->
      <aside>
        <input id="search-input" type="text" placeholder="Search notes..." oninput="renderNotes()" />
        <button class="btn-primary full-width" onclick="newNote()">+ New Note</button>
        <div id="notes-list"></div>
      </aside>

      <!-- Editor -->
      <main id="editor-panel">
        <div id="empty-state">Select a note or create a new one</div>
        <div id="editor" class="hidden">
          <input id="note-title" type="text" placeholder="Title" />
          <textarea id="note-content" placeholder="Write your note here..."></textarea>
          <div class="editor-actions">
            <button class="btn-primary" onclick="saveNote()">Save</button>
            <button class="btn-danger" onclick="deleteNote()">Delete</button>
          </div>
          <p id="save-status"></p>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
